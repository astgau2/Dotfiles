[config]


[templates.btop]
input_path = '/home/gin/.config/matugen/templates/btop.theme'
output_path = '~/.config/btop/themes/matugen.theme'
post_hook = 'pkill -USR2 btop || true'

[templates.gtk3]
input_path = '/home/gin/.config/matugen/templates/gtk-colors.css'
output_path = '~/.config/gtk-3.0/colors.css'
post_hook = 'gsettings set org.gnome.desktop.interface gtk-theme ""; gsettings set org.gnome.desktop.interface gtk-theme adw-gtk3-{{mode}}'

[templates.gtk4]
input_path = '/home/gin/.config/matugen/templates/gtk-colors.css'
output_path = '~/.config/gtk-4.0/colors.css'
# ...

[templates.kitty]
input_path = '/home/gin/.config/matugen/templates/kitty-colors.conf'
output_path = '~/.config/kitty/themes/Matugen.conf'
post_hook = "kitty +kitten themes --reload-in=all Matugen"

[templates.mango]
input_path = '/home/gin/.config/matugen/templates/mango.conf'
output_path = '~/.config/mango/colors.conf'
post_hook = 'mmsg -d reload_config'

[templates.nvim]
input_path = '/home/gin/.config/matugen/templates/nvim-colors.vim'
output_path = '~/.config/nvim/colors/matugen.vim'
post_hook = 'pkill -SIGUSR1 nvim'

[templates.waybar]
input_path = '~/.config/matugen/templates/waybar.css'
output_path = '~/.config/waybar/colors-matugen.css'
post_hook = 'pkill -SIGUSR2 waybar' # Reloads Waybar without restarting it

[templates.wofi]
input_path = "~/.config/matugen/templates/common-colors.css"
output_path = "~/.config/wofi/colors.css"

[templates.qt5ct]
input_path = '/home/gin/.config/matugen/templates/qtct-colors.conf'
output_path = '~/.config/qt5ct/colors/matugen.conf'

[templates.qt6ct]
input_path = '/home/gin/.config/matugen/templates/qtct-colors.conf'
output_path = '~/.config/qt6ct/colors/matugen.conf'
# ...

[templates.starship]
input_path = '/home/gin/.config/matugen/templates/starship-colors.toml'
output_path = '~/.config/starship.toml'


